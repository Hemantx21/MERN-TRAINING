<html>
    <head>
        <link rel="stylesheet" href="css/bootstrap.css">
        <style>
            .h
            {
                min-height: 300px;
            }
            .shd
            {
                box-shadow: 0px 0px 24px 3px black;
            }
            .x
            {
                height: 100px;
            }
            .my-clr
            {
                background: linear-gradient(90deg, #ec5574,#c670e8,#43aced);
            }
            .y
            {
                min-height: 50px;
                border: 1px solid black;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="row">
                <div class="col-sm-4 mx-auto mt-5 h  shd rounded-4">
                    <div class="row">
                        <div class="col-sm-12 x my-clr fw-bold text-white text-center pt-4 fs-2 rounded-top-4">Login Form</div>
                    </div>
                    <div class="mx-3">
                         <input type="email" placeholder="Email Address" class="rounded-5 form-control  y mt-5 mb-4">
                    </div>
                    <div class="mx-3">
                        <input type="password" placeholder="Password" class="rounded-5 form-control y mb-4  ">
                    </div>
                    <div class="mx-3">
                         <button class="my-clr rounded-5 text-center w-100 y mb-4">Login</button>
                    </div>
                    <div class="text-center mb-5">not a member? <a href="#"> Signup now</a></div>
                </div>
            </div>
        </div>
    </body>
</html>
