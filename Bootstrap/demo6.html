<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <style>
        .x
        {
            min-height: 100px;
        }
        .y
        {
            min-height: 50px;
        }
    </style>
</head>
<body>
    <div class="container bg-danger">
        <div class="row">
            <div class="col-6 bg-success x"></div>
            <div class="col-6 bg-warning x" ></div>
        </div>
        <div class="row">
            <div class="col-4 bg-primary x"></div>
            <div class="col-4 bg-dark x" >
                <div class="row">
                    <div class="col-12 bg-secondary y"></div>
                </div>
                <div class="row">
                    <div class="col-6 bg-danger y"></div>
                    <div class="col-6 bg-light y"></div>
                    
                </div>
            </div>
            <div class="col-4 bg-info x" ></div>
        </div>

    </div>
</body>
</html>
