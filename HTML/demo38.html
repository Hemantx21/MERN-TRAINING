<html>
    <head>
        <style>
            body{
                background:plum;
            }
            #outer
            {
                height:600px;
                width:900px;
                
                margin: 50px auto;
            }
            .row
            {
                height: 300px;
                width:900px;
                
            }
            .col
            {
                height: 280px;
                width:280px;
                background:white;
                float: left;
                box-sizing: border-box;
                margin:10px;
                border-radius: 5px;
                box-shadow: 0px 0px 10px rgba(0,0,0,1)
                padding:10px;
                 transform: scale(1.05);
                transition: all .5s;
            }
            .col img{
                height: 100%;
                width:100%;
                filter: grayscale(100%);
            }
            .col:hover
            {
                transform: scale(1.05);
                transition: all .5s;
            }


        </style>
    </head>
    <body>
        <div id="outer">
            <div class="row">
                <div class="col"></div>
                <div class="col"></div>
                <div class="col"></div>
            </div>
            <div class="row">
                <div class="col"></div>
                <div class="col"></div>
                <div class="col"></div>
            </div>
            
        </div>

    </body>
</html>
