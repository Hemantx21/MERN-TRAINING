<!DOCTYPE html>

<body>
    <script>
        let color = prompt("Enter traffic light color (red, yellow, or green):").toLowerCase();

switch (color) {
    case "red":
        console.log("Stop");
        break;
    case "yellow":
        console.log("Wait");
        break;
    case "green":
        console.log("Go");
        break;
    default:
        console.log("Invalid Color");
}
    </script>
</body>
</html>
