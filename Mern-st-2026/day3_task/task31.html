<!DOCTYPE html>

<body>
    <script>let num1 = 50;
let num2 = 10;
let operator = "-";

switch (operator) {
    case "+":
        console.log("Result:", num1 + num2);
        break;
    case "-":
        console.log("Result:", num1 - num2);
        break;
    case "*":
        console.log("Result:", num1 * num2);
        break;
    case "/":
        console.log("Result:", num1 / num2);
        break;
    default:
        console.log("Invalid operator");
}</script>
</body>
</html>
