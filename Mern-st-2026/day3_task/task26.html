<body>
<script>
var num1 = 20;
var num2 = 4;
var choice = "+";
var result;
if (choice == "+") {
result = num1 + num2;
} else if (choice == "-") {
result = num1 - num2;
} else if (choice == "*") {
result = num1 * num2;
} else if (choice == "/") {
result = num1 / num2;
}
document.write("Result is " + result);
</script>
</body>
