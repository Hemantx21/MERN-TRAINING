<html>
    <head>
        <style>
            body
            {
                background:#1c4893;
            }
            #key
            {
                height:275px;
                width: 1100px;
                background:#dfdfdf;
                margin:150px auto;
                padding:2px;
                box-shadow:0px 0px 1px #ffffff inset ;
                border-radius:4px;

            }
            .a
            {
                height:50px;
                width: 1092px;
                margin:3px ;
                background:#e6e6e6;

            .b

                border-radius:4px;
            }
            .box
            {
                height:46px;
                width:68px;

                border-radius:4px;
                text-align: center;
                line-height: 46px;
                font-family: sans-serif;

            .backspace

                line-height: 46px;

            }

                font-family: sans-serif;

                line-height: 46px;
                font-family: sans-serif;

                background: #ffffff;
                float: left;

                line-height: 46px;
                font-family: sans-serif;
            }

                float:left;
                margin:2px 1px;
                border-radius:4px;

        </style>
