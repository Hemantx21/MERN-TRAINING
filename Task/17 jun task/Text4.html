<html>

<head>
    <style>
        body {
            background: rgba(248, 248, 248, 1);
        }

        #clock {
            height: 230px;
            width: 400px;
            background:#ffffff;
            margin: 280px auto;
            box-sizing: border-box;
        }

        #top {
            height: 210px;
            width: 460px;
            background: rgba(97, 105, 107, 1);
            border: 18px solid rgba(38, 36, 47, 1);
            border-radius: 30px;
            box-shadow: -3px -6px 1px grey;
            box-sizing: border-box;
            padding-top: 15px;
            padding-left: 70px;
        }

        #bottom {
            height: 20px;
            width: 460px;
            background: aqua;
            box-shadow: 0px 0px 4px black inset;


        }

        .x {
            height: 20px;
            width: 170px;
            background: white;
            float: left;


        }

        .y {
            height: 20px;
            width: 120px;
            background: rgba(0, 0, 0, 1);
            float: left;



        }

        .class1 {
            height: 10px;
            width: 170px;
            background: #ffffff;
            /*box-shadow: 0px 2px 5px rgba(83, 82, 83, 1) inset;*/


        }

        .class2 {
            height: 10px;
            width: 170px;
            background: #ffffff;



        }

        
        
    </style>
</head>

<body>
    <div id="clock">
        <div id="top"> <font style=" font-size:140px; ">10:38</font><sub>PM</sub></div>
        <div id="bottom">

            <div class="x">
                <div class="class1"></div>
                <div class="class2"></div>
            </div>
            <div class="y"></div>
            <div class="x">
                <div class="class1"></div>
                <div class="class2"></div>
            </div>
        </div>

    </div>

</body>

</html>
