<html>
<head>
<style>
body{
    margin:0;
    background:#e6e6e6;
    font-family:Arial, sans-serif;

}

.border-box{
    width:700px;
    height:auto;
    margin:0 auto;
    border:12px solid #000;
    background:#ece58a;
    box-sizing:border-box;
    padding:45px;
}

.padding-text{
    font-size:28px;
    font-weight:bold;
    text-align:right;
    margin-bottom:20px;
}

.content{
    background:#fff;
    padding:20px;
    font-size:18px;
    line-height:30px;
}

.content-text{
    font-size:28px;
    font-weight:bold;
    margin-top:30px;
    text-align:right;
    padding-right:40px;
}
</style>
</head>
<body>

<div class="main">

    <div class="border-text">BORDER</div>

    <div class="margin-text">MARGIN</div>

    <div class="border-box">

        <div class="padding-text">PADDING</div>

        <div class="content">

</div>

</body>
</html>
