<html>
    <head>
        <style>
            #outer{
                background:whitesmoke;
                min-height:500px ;
                width: 1000px;
                margin: 0px auto;
                padding-bottom: 10px;
            }
            .a{
                height: 50px;
                width: 1000px;
                background:#ffc90e ;
                margin-bottom: 20px;
                border: solid 5px black;
                padding-top: 10px;
                box-sizing: border-box;
                margin-bottom: 10px;
            }
            .b{
                height: 400px;
                width: 1000px;
                background:whitesmoke;
                
                box-sizing: border-box;
                margin-bottom: 10px;
            }
            .b1{
                height: 390px;
                width: 90px;
                background: #ffc90e;
                margin-right: 10px;
                border: solid 5px black;
                float: left;
            }
            .b2{
                height: 400px;
                width: 890px;
                float: left;
                background: #99d9ea;
                border: 5px solid black;
                box-sizing: border-box;
            }
            .d1{
                background: yellow;
                width: 850px;
                height: 50px;
                margin-top: 5px;
                margin-left: 10px;
                border: solid 5px black;
                text-align: center;
                line-height: 25px;
            }
            .d2{
                background: #99d9ea;
                height: 300px;
                width: 850px;
                margin-top: 5px;
                margin-left: 10px;
                border: solid 5px black;
                line-height: 300px;
                text-align: center;
            }
            .d3{
                height: 30px ;
                width: 130px;
                border: 5px solid black;
                float: left;
                margin-top: 5px;
                margin-left: 5px;
               border-radius: 15px;
            }
            .d4{
                width: 300px;
                height: 30px;
                float: left;
                line-height: 40px;
            }
        </style>
    </head>
    <body>
        <div id="outer">
            <div class="a">Header</div>
            <div class="b">
                <div class="b1">Menu</div>
                <div class="b2">
                    <div class="d1">
                        <div class="d3">Tool1</div>
                        <div class="d3">tool2</div>
                        <div class="d3">tool3</div>
                        <div class="d4"></div>
                    </div>
                    <div class="d2">Map</div>
                </div>
            </div>
            <div class="a">Footer</div>
        </div>
    </body>
</html>
