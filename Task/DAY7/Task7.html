<html>
<head>
<style>
body {
    margin:0;
    background:#eef2f5;
    font-family:Arial, sans-serif;
}

.main {
    width:900px;
    height:550px;
    border:4px dashed lightgray;
    background:#eef2f5;
    margin:30px auto;
}

.margin {
    text-align:center;
    font-size:45px;
    font-weight:bold;
    margin:20px 0;
}

.border {
    width:720px;
    height:auto;
    background:#0aa6c2;
    margin:20px auto;
    padding:20px;
}

.border h2 {
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.padding {
    width:600px;
    height:auto;
    background:#ff7b5a;
    margin:0 auto;
    padding:20px;
}

.padding h2 {
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.content {
    width:300px;
    height:130px;
    background:white;
    border:2px dashed lightgray;
    margin:40px auto; 
    text-align:center;
    line-height:130px;
    font-size:35px;
}
</style>
</head>

<body>
<div class="main">

    <div class="margin">Margin</div>

    <div class="border">
        <h2>Border</h2>

        <div class="padding">
            <h2>Padding</h2>

            <div class="content">Content</div>
        </div>
    </div>

</div>
</body>
</html>
