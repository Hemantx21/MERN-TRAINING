<html>
    <head>
        <style>
            img{
                height: 500px;
                width: 500px;
                margin: 0px auto;
                padding: 30px;
                border: 10px groove palevioletred;
                box-shadow: 0px 0px 20px black inset;
            }
        </style>
    </head>
    <body> 
        <center> <h1>Slider By Hemant </h1>
            <hr/>
        <img src="images/bg.jpg"  id = "im" alt="abcd">
</center>
     <script>
        var arr=["images/bg.jpg","images/b.jpg","images/2.jpg","images/3.jpg"]
        var i=0
        //alert(arr[i])
        function slider(){
            var im = document.querySelector("#im")
            im.src=arr[i]
            i++
            if(i==4)
        {
            i=0
        }
           // alert("ok")
        }
        setInterval("slider()",1000)
     </script>  
    </body>
</html>
