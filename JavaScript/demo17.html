<html>

<head>
    <style>
        h1
        {
            border: 10px groove lightgreen;
            color: lightgreen;
            text-align:center;
            width: 400px;
            float: left;
        }
    </style>

</head>

<body>
    <h1 id="x" >Techpile Technology</h1>
    <h1 id="y"> Code Helper</h1>
    <button ondblclick="demo()">SWAP TEXT</button>
    <script>
        function demo() {
            var obj1 = document.getElementById("x")
            var obj2 = document.getElementById("y")
            var text1 = obj1.innerText
            var text2 = obj2.innerText
            obj1.innerText = text2
            obj2.innerText = text1
        }
        window.setInterval("demo()",2000)
    </script>
</body>

</html>
