<html>
    <head>
<style>
    #cal
    {
        min-height: 300px;
        width:400px;
        background: whitesmoke;
        margin:100px auto;
        box-shadow: 0px 0px 50px black;
        border-radius: 10px;
        padding:25px;
        box-sizing: border-box;

    }
    input
    {
        height: 50px;
        width:100%;
        margin: 10px 0px;
        padding-left: 20px;
        box-sizing: border-box;
        border:none;
        box-shadow: 0px 0px 10px black inset;
        border-radius: 5px;
    }
    button{
        height:50px;
        width:50px;
        border: none;
        border-radius: 5px;
        background: palevioletred;
        font-size: 30px;
        color: white;


    }
</style>
    </head>
    <body>
        <div id="cal">
            <p style="font-weight: bold;font-size: 24px;text-align: center;">Simple Calculator By Hemant</p>
            <input type="number" id="t1" placeholder="Enter First No : "/><br/> 
            <input type="number" id="t2" placeholder="Enter Second No : "/><br/> 
            <p id="msg"></p>
            <button onclick="addFun()">+</button>
            <button onclick="subFun()">-</button>
            <button onclick="mulFun()">x</button>
            <button onclick="divFun()">/</button>
        </div>\
        <script>
            function addFun()
            {
                var t1=document.querySelector("#t1")
                var t2=document.querySelector("#t2")
                var msg=document.querySelector("#msg")
                var num1=parseFloat(t1.value)
                var num2=parseFloat(t2.value)
                var res=num1+num2
                //msg.innerHTML="<b>Result is : <b/>"+res
                msg.innerHTML=`<b>Result is : <b/>${res.toFixed(3)}`

            }
            function subFun()
            {
                var t1=document.querySelector("#t1")
                var t2=document.querySelector("#t2")
                var msg=document.querySelector("#msg")
                var num1=parseFloat(t1.value)
                var num2=parseFloat(t2.value)
                var res=num1-num2
                //msg.innerHTML="<b>Result is : <b/>"+res
                msg.innerHTML=`<b>Result is : <b/>${res.toFixed(3)}`

            }
            function mulFun()
            {
                var t1=document.querySelector("#t1")
                var t2=document.querySelector("#t2")
                var msg=document.querySelector("#msg")
                var num1=parseFloat(t1.value)
                var num2=parseFloat(t2.value)
                var res=num1*num2
                //msg.innerHTML="<b>Result is : <b/>"+res
                msg.innerHTML=`<b>Result is : <b/>${res.toFixed(3)}`

            }
            function divFun()
            {
                var t1=document.querySelector("#t1")
                var t2=document.querySelector("#t2")
                var msg=document.querySelector("#msg")
                var num1=parseFloat(t1.value)
                var num2=parseFloat(t2.value)
                var res=num1/num2
                //msg.innerHTML="<b>Result is : <b/>"+res
                msg.innerHTML=`<b>Result is : <b/>${res.toFixed(3)}`

            }
           
        </script>
    </body>
</html>
