<html>
    <head>
        <style>
            img{
                height:300px;
                width:200px;
                padding: 25px;
                border-radius: 10px;
                border:10px solid goldenrod;
                margin:25px
            }
        </style>
    </head>
    <body>
        <img src="images/1.jpg" id="im1"/>
        <img src="images/bg.jpg" id="im2"/>
       // <button onclick="demo()">Click Me</button>
        <script>
            function demo()
            {
                var i1 =document.getElementById("im1")
                var i2 =document.getElementById("im2")
                var path1=i1.src
                var path2=i2.src
                i1.src=path2
                i2.src=path1
            }
            setInterval(demo,500)
        </script>
    </body>
</html>
